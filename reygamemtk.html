<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game MTK Stickman - Kelas 78 Pro Edition</title>
    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background-color: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        .bg-text { position: absolute; font-size: 25px; color: rgba(255,255,255,0.1); white-space: nowrap; z-index: -1; pointer-events: none; font-weight: bold; }
        @keyframes drift { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        #game-container { background: #ecf0f1; color: #333; padding: 25px; border-radius: 25px; box-shadow: 0 0 30px rgba(255,165,0,0.5); text-align: center; width: 450px; position: relative; z-index: 10; border: 6px solid #f39c12; }
        .hidden { display: none; }
        
        .btn { padding: 10px; margin: 5px; cursor: pointer; background: #e67e22; color: white; border: none; border-radius: 12px; font-weight: bold; width: 135px; transition: 0.2s; border-bottom: 4px solid #d35400; }
        .btn:hover { background: #d35400; transform: translateY(-3px); }
        .btn-time { background: #2980b9; border-bottom: 4px solid #1c5980; }

        #canvas-area { width: 100%; height: 130px; background: #87CEEB; margin: 15px 0; border-bottom: 5px solid #2ecc71; position: relative; overflow: hidden; border-radius: 15px; }
        #stickman { position: absolute; bottom: 10px; left: 20px; font-size: 50px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #wall { position: absolute; bottom: 0; right: 45px; width: 25px; height: 85px; background: #7f8c8d; border-radius: 5px 5px 0 0; }

        #timer { font-size: 28px; color: #e74c3c; font-weight: bold; text-shadow: 1px 1px 0px #fff; }
        #question { font-size: 32px; margin: 10px 0; color: #2c3e50; font-weight: 900; }
        #message { font-size: 20px; margin-top: 10px; font-weight: bold; min-height: 50px; }
        input { padding: 12px; font-size: 22px; width: 140px; text-align: center; border: 3px solid #f39c12; border-radius: 10px; background: #fff; }
        
        .footer-78 { font-size: 14px; margin-top: 15px; color: #7f8c8d; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div style="position:fixed; top:5%; width:100%; overflow:hidden;"><div class="bg-text" style="animation: drift 8s linear infinite;">BUATAN KELAS 78 ★ BUATAN KELAS 78 ★ BUATAN KELAS 78</div></div>
    <div style="position:fixed; top:45%; width:100%; overflow:hidden;"><div class="bg-text" style="animation: drift 12s linear infinite reverse;">BUATAN KELAS 78 ★ BUATAN KELAS 78 ★ BUATAN KELAS 78</div></div>
    <div style="position:fixed; top:85%; width:100%; overflow:hidden;"><div class="bg-text" style="animation: drift 10s linear infinite;">BUATAN KELAS 78 ★ BUATAN KELAS 78 ★ BUATAN KELAS 78</div></div>

    <div id="game-container">
        <h2 style="margin:0; color:#d35400; text-transform:uppercase;">🔥 MATH CHALLENGE 78 🔥</h2>
        
        <div id="menu-level">
            <p style="font-weight:bold">PILIH LEVEL MATEMATIKA SMP:</p>
            <button class="btn" onclick="selectLevel(1)">LV 1: Perkalian</button>
            <button class="btn" onclick="selectLevel(2)">LV 2: Pecahan</button>
            <button class="btn" onclick="selectLevel(3)">LV 3: Pecahan C.</button>
            <button class="btn" onclick="selectLevel(4)">LV 4: Desimal</button>
            <button class="btn" onclick="selectLevel(5)">LV 5: Aljabar</button>
            <button class="btn" onclick="selectLevel(6)">LV 6: Kuadrat</button>
            <button class="btn" onclick="selectLevel(7)">LV 7: Akar</button>
            <button class="btn" onclick="selectLevel(8)">LV 8: Negatif</button>
            <button class="btn" onclick="selectLevel(9)">LV 9: Final!</button>
            <div class="footer-78">CREATIVE BY KELAS 78</div>
        </div>

        <div id="menu-time" class="hidden">
            <h3 style="color:#2980b9">MODENYA?</h3>
            <button class="btn btn-time" onclick="startGame(5)">🔥 SANGAT CEPAT</button>
            <button class="btn btn-time" onclick="startGame(10)">⚡ NORMAL</button>
            <button class="btn btn-time" onclick="startGame(20)">🍃 SANTAI</button>
        </div>

        <div id="game-play" class="hidden">
            <div id="canvas-area">
                <div id="stickman">🏃</div>
                <div id="wall"></div>
            </div>
            <div id="timer">00</div>
            <div id="question"></div>
            <input type="text" id="answer-input" placeholder="Jawab!">
            <button class="btn" style="width:80px" onclick="checkAnswer()">GO!</button>
            <div id="message"></div>
            <div class="footer-78">GASPOL KELAS 78!</div>
        </div>
    </div>

<script>
    let currentLevel = 0;
    let chosenTime = 10;
    let correctAnswer = "";
    let timerInterval;
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let bgMusicInterval;

    function playSound(freq, type, duration, slide = 0) {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if(slide !== 0) osc.frequency.exponentialRampToValueAtTime(slide, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function startBackgroundMusic() {
        if(bgMusicInterval) clearInterval(bgMusicInterval);
        bgMusicInterval = setInterval(() => {
            // Melodi menantang
            playSound(200, 'square', 0.1);
            setTimeout(() => playSound(250, 'square', 0.1), 150);
            setTimeout(() => playSound(220, 'square', 0.1), 300);
        }, 600);
    }

    function selectLevel(lv) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        currentLevel = lv;
        document.getElementById('menu-level').classList.add('hidden');
        document.getElementById('menu-time').classList.remove('hidden');
        playSound(440, 'sine', 0.2);
    }

    function startGame(sec) {
        chosenTime = sec;
        document.getElementById('menu-time').classList.add('hidden');
        document.getElementById('game-play').classList.remove('hidden');
        startBackgroundMusic();
        generateQuestion();
    }

    function generateQuestion() {
        let q = "";
        let a, b;
        switch(currentLevel) {
            case 1: a=Math.floor(Math.random()*15)+10; b=7; q=`${a} x ${b}`; correctAnswer=(a*b).toString(); break;
            case 2: a=Math.floor(Math.random()*5)+2; q=`1/3 x 1/${a}`; correctAnswer=`1/${3*a}`; break;
            case 3: q=`2 1/4 + 1/4`; correctAnswer=`2.5`; break;
            case 4: a=(Math.random()*9).toFixed(1); q=`${a} x 100`; correctAnswer=(parseFloat(a)*100).toFixed(0); break;
            case 5: a=Math.floor(Math.random()*5)+3; q=`${a}x = ${a*5}, x?`; correctAnswer="5"; break;
            case 6: a=Math.floor(Math.random()*12)+1; q=`${a}²`; correctAnswer=(a*a).toString(); break;
            case 7: a=Math.floor(Math.random()*10)+1; q=`√${a*a}`; correctAnswer=a.toString(); break;
            case 8: a=Math.floor(Math.random()*10)-15; b=Math.floor(Math.random()*10)+5; q=`${a} + ${b}`; correctAnswer=(a+b).toString(); break;
            case 9: q=`-5 + (2 x 10)`; correctAnswer="15"; break;
        }
        document.getElementById('question').innerText = q;
        document.getElementById('answer-input').value = "";
        document.getElementById('answer-input').focus();
        startTimer();
    }

    function startTimer() {
        let t = chosenTime;
        document.getElementById('timer').innerText = `⏱ ${t}s`;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            t--;
            document.getElementById('timer').innerText = `⏱ ${t}s`;
            if(t <= 5) playSound(800, 'sine', 0.05); // Suara detak bahaya
            if(t <= 0) gameOver("WAKTU HABIS! ⏱");
        }, 1000);
    }

    function checkAnswer() {
        let user = document.getElementById('answer-input').value.trim();
        if(user == correctAnswer) {
            clearInterval(timerInterval);
            // SUARA MENANG NEXT
            playSound(523, 'sine', 0.1); 
            setTimeout(() => playSound(659, 'sine', 0.1), 100);
            setTimeout(() => playSound(783, 'sine', 0.3), 200);

            document.getElementById('stickman').style.left = "360px";
            document.getElementById('stickman').innerText = "🚀";
            document.getElementById('message').innerHTML = "<span style='color:green'>NEXT LEVEL! KELAS 78 MANTAP! ✅</span>";
            
            setTimeout(() => {
                document.getElementById('stickman').style.left = "20px";
                document.getElementById('stickman').innerText = "🏃";
                document.getElementById('message').innerText = "";
                generateQuestion();
            }, 1200);
        } else {
            gameOver("SALAH JAWAB! ❌");
        }
    }

    function gameOver(txt) {
        clearInterval(timerInterval);
        clearInterval(bgMusicInterval);
        // SUARA KALAH
        playSound(300, 'sawtooth', 0.5, 50); 
        
        document.getElementById('stickman').innerText = "💀";
        document.getElementById('message').innerHTML = `
            <span style="color:red; font-size:24px;">${txt}</span><br>
            Jawaban: <b>${correctAnswer}</b><br>
            <button class="btn" style="background:#2ecc71" onclick="location.reload()">COBA LAGI</button>
        `;
    }

    document.getElementById("answer-input").addEventListener("keyup", (e) => { if(e.key === "Enter") checkAnswer(); });
</script>
</body>
</html>
